<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            margin: 0;
            background-color: #eef2f3;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .content {
            padding: 30px;
        }

        .skills ul {
            list-style-type: square;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <header>
        <h1>John Doe</h1>
        <p>Web Developer | Designer | Freelancer</p>
    </header>

    <div class="content">
        <h2>About Me</h2>
        <p>Hello! I am a passionate web developer who loves building websites and learning new technologies.</p>

        <div class="skills">
            <h2>My Skills</h2>
            <ul>
                <li>HTML & CSS</li>
                <li>JavaScript</li>
                <li>React</li>
                <li>Node.js</li>
            </ul>
        </div>

        <h2>Contact</h2>
        <p>If you'd like to work with me, click the button below.</p>
        <button onclick="alert('Thanks for reaching out!')">Contact Me</button>
    </div>

</body>

</html>
